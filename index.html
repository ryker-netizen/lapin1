<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VOID_ARCHIVE // LAPIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --glitch-color: #ff0000;
            --primary: #d1d1d1;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        /* Загрузочный экран */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff00;
            padding: 20px;
        }

        /* Иммерсивный фон */
        .viewport-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), 
                        radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            opacity: 0.4;
            z-index: -1;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Glitch Animation */
        .glitch { position: relative; display: inline-block; }
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 2px; text-shadow: -1px 0 red; top: 0;
            background: var(--bg); overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: noise-anim 2s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            100% { clip: rect(80px, 9999px, 90px, 0); }
        }

        .scan-line {
            width: 100%; height: 100px; z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { 0% { bottom: 100%; } 100% { bottom: -100%; } }

        .sidebar-link {
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255,255,255,0.05);
            color: #fff;
            padding-left: 1rem;
            border-left: 2px solid #fff;
        }

        .btn-branch {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-branch:hover {
            background: #fff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="viewport-background"></div>

                <span class="text-[10px] opacity-50 uppercase tracking-widest">Status: <span class="text-green-500">Online</span></span>

            </div>
            <div class="glitch font-bold tracking-widest text-sm" data-text="LAPIN SYSTEM v2.0">LAPIN SYSTEM v2.0</div>
            <div class="text-[10px] opacity-50 font-mono" id="clock">00:00:00</div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <nav class="w-72 border-r border-white/10 p-6 flex flex-col gap-2 bg-black/40 overflow-y-auto">
                <div class="text-[9px] uppercase tracking-widest opacity-30 mb-4 font-bold border-b border-white/10 pb-2">Main_Directories</div>
                <a href="#vzaidkost" class="sidebar-link p-2 text-xs opacity-60">/root/vzaidkost</a>
                <a href="#murmure-de-vide" class="sidebar-link p-2 text-xs opacity-60">/root/murmure-de-vide</a>
                <a href="#ili" class="sidebar-link p-2 text-xs opacity-60">/root/ili</a>
                <a href="#foryouhaaa" class="sidebar-link p-2 text-xs opacity-60">/root/foryouhaaa</a>
                <a href="#limite" class="sidebar-link p-2 text-xs opacity-60">/root/limite</a>
                
                <div class="text-[9px] uppercase tracking-widest opacity-30 mt-6 mb-4 font-bold border-b border-white/10 pb-2">Sub_Layers</div>
                <a href="#mirror" class="sidebar-link p-2 text-xs text-red-400 opacity-80">/root/mirror_1788</a>
                
                <div class="mt-auto space-y-2">
                    <div class="text-[8px] opacity-20 uppercase">Experimental_Paths</div>
                    <div class="flex gap-2">
                        <a href="#dialog-a" class="flex-1 text-center border border-white/10 text-[10px] py-1 hover:bg-white hover:text-black">A</a>
                        <a href="#dialog-b" class="flex-1 text-center border border-white/10 text-[10px] py-1 hover:bg-white hover:text-black">B</a>
                        <a href="#dialog-c" class="flex-1 text-center border border-white/10 text-[10px] py-1 hover:bg-white hover:text-black">C</a>
                    </div>
                </div>
            </nav>

            <main class="flex-1 overflow-y-auto p-12 relative">
                <div id="view-container" class="max-w-3xl mx-auto opacity-0 transition-all duration-700 transform translate-y-4">
                    </div>
            </main>
        </div>

        <footer class="border-t border-white/10 p-2 text-[8px] flex justify-between px-6 bg-black/90">
            <div class="opacity-20 uppercase tracking-tighter">Syndicate Engine // Void Protocols Active</div>
            <div class="opacity-20 uppercase tracking-widest">"ответ — это то, что ты сам унесёшь"</div>
        </footer>
    </div>

    <script>
        const DATA = {
            'vzaidkost': {

                            архив неслучившегося

                        <div class="space-y-6 text-sm opacity-70 leading-relaxed">
                            <p>здесь правда — не в строчках, а в паузе меж них,<br>где эхо без голоса стелется в тишь.<br>не место, а след от несказанных слов,<br>что таял во мгле, не дойдя до основ.</p>
                            <p class="text-white font-bold py-4 border-y border-white/5">ты ищешь названья? его тут не жди,<br>оно растворилось в безликой груди.<br>ты видишь не буквы — лишь призрак чернил,<br>что ветер циферблатов давно уносил.</p>
                            <p>здесь нету дверей, есть лишь тонкая грань,<br>где мысль, не рождённая, прячется в гарь.<br>ты входишь с вопросом, но вскоре поймёшь:<br>ответ — это то, что ты сам унесёшь.</p>
                        </div>
                    </div>
                `
            },
            'murmure-de-vide': {
                title: 'DIRECTORY // MURMURE_DE_VIDE',
                content: `<div class="whitespace-pre-line text-sm opacity-80 leading-loose">Source: https://t.me/Auuddvordu\n\nЭхо пустоты зафиксировано.\nОбъекты не обнаружены.\nТолько тишина.</div>`
            },
            'ili': {
                title: 'DIRECTORY // ILI',

            },

                title: 'SI VOUS ÊTES ARRIVÉ JUSQU\'ICI',
                content: `
                    <p class="mb-8 text-sm opacity-70">Data analysis complete... Select your synchronization path:</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div onclick="location.hash='dialog-a'" class="btn-branch">PATH_A</div>
                        <div onclick="location.hash='dialog-b'" class="btn-branch">PATH_B</div>
                        <div onclick="location.hash='dialog-c'" class="btn-branch">PATH_C</div>
                    </div>
                `
            },
            'mirror': {
                title: 'MIRROR_DECRYPTOR_#1788',
                content: `
                    <div class="bg-red-900/10 border border-red-900/30 p-4 mb-6 text-[10px] uppercase text-red-500">
                        Warning: Memory fragmentation detected. Decoding required.
                    </div>
                    <div class="bg-black/40 border border-white/5 p-6 font-mono text-xs tracking-[0.3em] mb-8 leading-loose" id="morse-box">
                        - .... .. ... / .. ... / -. --- - / .- / -.. .-. . .- -- / ... --- -- . / --- -. . / .. ... / .-- .- - -.-. .... .. -. --. / -.-- --- ..- / .-.. .- .--. .. -.
                    </div>
                    <button onclick="runDecrypt()" id="dec-btn" class="border border-white/30 px-8 py-3 text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">
                        Execute Decryption Protocol
                    </button>
                    <div id="dec-res" class="mt-10 text-xl font-bold tracking-[0.2em] text-white hidden glitch" data-text=""></div>
                `
            },
            'dialog-a': { title: 'PATH // A', content: '<div class="text-sm opacity-50">Connecting to terminal 2Z5pdpC... [ACCESS DENIED]</div>' },
            'dialog-b': { title: 'PATH // B', content: '<div class="text-sm opacity-50">Connecting to terminal wtqtwY0... [CONNECTION LOST]</div>' },
            'dialog-c': { title: 'PATH // C', content: '<div class="text-sm opacity-50">Connecting to terminal nif1_K6... [ENCRYPTED]</div>' }
        };

        function initBoot() {
            const log = document.getElementById('boot-log');
            const lines = [
                "> INITIALIZING SYNDICATE_CORE...",
                "> MOUNTING /ROOT/LAPIN...",
                "> LOADING NEURAL_INTERFACE...",
                "> ACCESSING VZAIDKOST_ARCHIVE...",
                "> DECRYPTING VISUAL_LAYER...",
                "> SYSTEM_READY."
            ];
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < lines.length) {
                    log.innerHTML += `<div>${lines[i]}</div>`;
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('boot-screen').style.opacity = '0';
                        setTimeout(() => document.getElementById('boot-screen').remove(), 1000);
                        renderView();
                    }, 800);
                }
            }, 300);
        }

        function renderView() {
            const hash = window.location.hash.replace('#', '') || 'vzaidkost';
            const container = document.getElementById('view-container');
            const data = DATA[hash] || DATA['vzaidkost'];

            // Update active state in sidebar
            document.querySelectorAll('.sidebar-link').forEach(l => {
                l.classList.toggle('active', l.getAttribute('href') === `#${hash}`);
            });

            container.classList.remove('opacity-100', 'translate-y-0');
            container.classList.add('opacity-0', 'translate-y-4');

            setTimeout(() => {
                container.innerHTML = `
                    <h2 class="text-3xl font-bold mb-12 tracking-tighter uppercase glitch" data-text="${data.title}">${data.title}</h2>
                    ${data.content}
                `;
                container.classList.remove('opacity-0', 'translate-y-4');
                container.classList.add('opacity-100', 'translate-y-0');
            }, 300);
        }

        function runDecrypt() {
            const res = document.getElementById('dec-res');
            const btn = document.getElementById('dec-btn');
            btn.innerHTML = "DECODING...";
            btn.disabled = true;
            
            setTimeout(() => {
                const text = "THIS IS NOT A DREAM. SOMEONE IS WATCHING YOU, LAPIN.";
                res.innerHTML = text;
                res.setAttribute('data-text', text);
                res.classList.remove('hidden');
                btn.style.display = 'none';
            }, 2000);
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }

        window.addEventListener('hashchange', renderView);
        window.onload = () => {
            initBoot();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
